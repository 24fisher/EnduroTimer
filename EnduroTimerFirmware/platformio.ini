[platformio]
default_envs = start_station
data_dir = start-station/data
src_dir = .

[env]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
lib_deps =
  jgromes/RadioLib@^7.1.2
  bblanchon/ArduinoJson@^7.4.2
  olikraus/U8g2@^2.36.5
build_flags =
  -D LORA_FREQUENCY_MHZ=868.0
  -D LORA_BANDWIDTH_KHZ=125.0
  -D LORA_SPREADING_FACTOR=10
  -D LORA_CODING_RATE=5
  -D LORA_TX_POWER_DBM=14
  -D FIRMWARE_VERSION=\"0.26\"
  -D STATUS_LED_PIN=35
  -D STATUS_LED_ACTIVE_LEVEL=1
  ; Heltec WiFi LoRa 32 V3 built-in OLED usually uses SDA GPIO17, SCL GPIO18, RST GPIO21, address 0x3C. VextCtrl is often GPIO36 and usually active LOW, but revisions/clones may differ.
  -D OLED_SDA=17
  -D OLED_SCL=18
  -D OLED_RST=21
  -D OLED_VEXT=36
  -D OLED_VEXT_ON_LEVEL=0
  -D OLED_SCAN_ONLY=0
  -D OLED_DRAW_TEST_ONLY=0
  -D OLED_TEST_PATTERN_ONLY=0
  -D OLED_INVERT_TEST=0
  -D OLED_I2C_CLOCK_HZ=400000
  -D OLED_USE_SW_I2C=0
  -D OLED_DRIVER_TYPE=SSD1306_NONAME
  -D ARDUINO_USB_CDC_ON_BOOT=0
  -D ARDUINO_USB_MODE=0
  -D ENABLE_LORA_TIME_SYNC=0
  -D LORA_RX_POLL_TIMEOUT_MS=0
  -D LORA_MAX_POLL_DURATION_WARN_MS=20
  -D LORA_MAX_TX_DURATION_WARN_MS=300
  -D MINIMAL_LORA_DEBUG_MODE=1
  -I common
  -I common/protocol
  -I common/time
  -I common/display
  -I common/hardware

[env:start_station]
build_flags =
  ${env.build_flags}
  -D START_STATION
  -D ENABLE_OLED=1
  -D ENABLE_WIFI=1
  -D ENABLE_WEB=1
  -D ENABLE_LORA=1
  -D ENABLE_WEB_START=0
  -D FIRMWARE_ROLE=\"StartStation\"
  -I start-station/src
build_src_filter =
  +<common/**/*.cpp>
  +<start-station/src/**/*.cpp>
  -<finish-station/**>
  -<repeater-station/**>
board_build.filesystem = littlefs

[env:finish_station]
build_flags =
  ${env.build_flags}
  -D FINISH_STATION
  -D ENABLE_OLED=1
  -D ENABLE_WIFI=1
  -D ENABLE_WEB=0
  -D ENABLE_LORA=1
  -D FIRMWARE_ROLE=\"FinishStation\"
  -D FINISH_STATUS_INTERVAL_MS=15000
  -D FINISH_HELLO_ENABLED=0
  -D FINISH_STATUS_ENABLED=1
  -I finish-station/src
build_src_filter =
  +<common/**/*.cpp>
  +<finish-station/src/**/*.cpp>
  -<start-station/**>
  -<repeater-station/**>


[env:repeater_station]
build_flags =
  ${env.build_flags}
  -D REPEATER_STATION
  -D ENABLE_OLED=1
  -D ENABLE_LORA=1
  -D ENABLE_WIFI=0
  -D ENABLE_WEB=0
  -D ENABLE_REPEATER=1
  -D FIRMWARE_ROLE=\"RepeaterStation\"
  -D REPEATER_RELAY_HELLO=0
  -D REPEATER_RELAY_STATUS=0
  -I repeater-station/src
build_src_filter =
  +<common/**/*.cpp>
  +<repeater-station/src/**/*.cpp>
  -<start-station/**>
  -<finish-station/**>
